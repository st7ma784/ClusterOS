# Cluster-OS Node Configuration

# Node identity
identity:
  path: /var/lib/cluster-os/identity.json

# Discovery settings
discovery:
  # Serf bind address (0.0.0.0 for all interfaces)
  bind_addr: 0.0.0.0
  bind_port: 7946

  # Bootstrap nodes to join (empty for first node)
  bootstrap_peers: []

  # Node name (defaults to hostname)
  node_name: ""

  # Serf encryption key (base64 encoded, leave empty to disable)
  encrypt_key: ""

# Networking settings
# NOTE: WireGuard (interface/listen_port) is replaced by Tailscale for overlay networking.
# These fields are parsed by config.go but the WireGuardManager is never instantiated
# by the current node-agent. They are kept to avoid config parse errors.
networking:
  # Legacy: WireGuard interface name (not used — Tailscale replaced WireGuard)
  interface: ""

  # Legacy: WireGuard listen port (not used — Tailscale replaced WireGuard)
  listen_port: 0

  # Subnet used for internal addressing reference
  subnet: "10.42.0.0/16"

  # Enable IPv6
  ipv6: false

  # WiFi configuration (set via environment variables during image build)
  wifi:
    enabled: false
    ssid: ""
    key: ""

# Tailscale settings
tailscale:
  # OAuth client credentials (loaded from /etc/cluster-os/tailscale-oauth.conf if available)
  oauth_client_id: ""
  oauth_client_secret: ""
  tailnet: ""

  # Enable API-based discovery (uses Tailscale API to find cluster peers)
  api_discovery: true

# Role configuration
roles:
  # Enabled roles for this node
  # All nodes can be SLURM controller or worker - Raft elects the leader
  # All nodes can be K3s server or agent - Raft elects the leader
  enabled:
    # wireguard role removed — overlay networking is Tailscale, not WireGuard
    - k3s-server
    - k3s-agent
    - slurm-controller
    - slurm-worker

  # Node capabilities (auto-detected if empty)
  capabilities:
    cpu: 0  # Number of CPU cores (0 = auto-detect)
    ram: ""  # RAM size (e.g., "64GB", empty = auto-detect)
    gpu: false  # GPU available
    arch: ""  # Architecture (e.g., "amd64", empty = auto-detect)

# Logging configuration
logging:
  level: info  # debug, info, warn, error
  format: json  # json or text
  output: stdout  # stdout, stderr, or file path

# Cluster settings
cluster:
  name: cluster-os
  region: default
  datacenter: default

  # Cluster authentication key (REQUIRED)
  # Auto-generated at build time from git repo identity.
  # Each fork derives its own unique key. Override with env: CLUSTEROS_CLUSTER_AUTH_KEY
  auth_key: "GENERATE_AT_BUILD_TIME"
