name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
    paths:
      - 'node/Dockerfile'
      - 'node/**'
      - 'patch/**'
      - 'test/docker/entrypoint.sh'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: st7ma784/clusteros
  GO_VERSION: '1.22.0'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build node-agent binary
        run: make node

      # Create the three secret files the Dockerfile COPYs.
      # PR builds skip this (secrets unavailable on forks) and produce a stub image
      # that won't connect to Tailscale or Cloudflare — useful for compile-only checks.
      - name: Create secret files for Docker build
        if: github.event_name != 'pull_request'
        env:
          TAILSCALE_ENV: ${{ secrets.TAILSCALE_ENV }}
          CLUSTER_KEY: ${{ secrets.CLUSTER_KEY }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          CLOUDFLARE_DOMAIN: ${{ secrets.CLOUDFLARE_DOMAIN }}
        run: |
          mkdir -p patch

          # tailscale.env — full file content stored as a multi-line secret
          if [ -n "$TAILSCALE_ENV" ]; then
            printf '%s\n' "$TAILSCALE_ENV" > patch/tailscale.env
          else
            touch patch/tailscale.env
          fi
          chmod 600 patch/tailscale.env

          # cluster.key — base64 auth key
          if [ -n "$CLUSTER_KEY" ]; then
            printf '%s' "$CLUSTER_KEY" > cluster.key
          else
            # Generate a throwaway key so the build doesn't fail
            head -c 32 /dev/urandom | base64 > cluster.key
          fi
          chmod 600 cluster.key

          # cloudflare.env
          if [ -n "$CLOUDFLARE_TUNNEL_TOKEN" ]; then
            printf 'CLOUDFLARE_TUNNEL_TOKEN=%s\nCLOUDFLARE_DOMAIN=%s\n' \
              "$CLOUDFLARE_TUNNEL_TOKEN" "${CLOUDFLARE_DOMAIN:-stevemander.uk}" \
              > patch/cloudflare.env
          else
            cp patch/cloudflare.env.example patch/cloudflare.env
          fi
          chmod 600 patch/cloudflare.env

      - name: Create stub secret files for PR builds
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p patch
          touch patch/tailscale.env
          head -c 32 /dev/urandom | base64 > cluster.key
          cp patch/cloudflare.env.example patch/cloudflare.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./node/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max