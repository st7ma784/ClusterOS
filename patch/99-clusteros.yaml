network:
  version: 2
  renderer: networkd
  ethernets:
    all-en:
      match:
        name: "en*"
      dhcp4: true
      dhcp-identifier: mac
      optional: true
      link-local: [ipv4, ipv6]   # 169.254.x.x + fe80:: when no DHCP — enables p2p Ethernet patches
    all-eth:
      match:
        name: "eth*"
      dhcp4: true
      dhcp-identifier: mac
      optional: true
      link-local: [ipv4, ipv6]   # 169.254.x.x + fe80:: when no DHCP — enables p2p Ethernet patches
  # WiFi is NOT configured here: networkd renderer requires exact interface names,
  # not match: patterns. cluster-wifi.service writes /etc/netplan/80-cluster-wifi.yaml
  # with the real interface name at boot time.
