network:
  version: 2
  ethernets:
    all-en:
      match:
        name: "en*"
      dhcp4: true
      dhcp-identifier: mac
      optional: true
      link-local: [ipv4, ipv6]   # 169.254.x.x + fe80:: when no DHCP — enables p2p Ethernet patches
    all-eth:
      match:
        name: "eth*"
      dhcp4: true
      dhcp-identifier: mac
      optional: true
      link-local: [ipv4, ipv6]   # 169.254.x.x + fe80:: when no DHCP — enables p2p Ethernet patches
  wifis:
    all-wl:
      match:
        name: "wl*"
      dhcp4: true
      optional: true
      link-local: [ipv4, ipv6]
      access-points:
        "MANDER84":
          password: "M4nd3rsM0b"
