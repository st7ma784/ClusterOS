# ClusterOS Node Configuration
# Generated at image build time

node:
  data_dir: /var/lib/clusteros
  log_dir: /var/log/clusteros

discovery:
  bind_port: 7946
  bootstrap_peers: []

wireguard:
  listen_port: 51820
  mtu: 1420

# Roles to enable on this node
# The node-agent will manage these services based on cluster state and leader election
roles:
  enabled:
    - tailscale
    - k3s-server
    - k3s-agent
    - slurm-controller
    - slurm-worker

# Tailscale settings
tailscale:
  api_discovery: true

# Cluster settings
cluster:
  election_mode: serf
  # Cluster authentication key (REQUIRED)
  # Auto-generated at build time from git repo identity.
  # Each fork derives its own unique key — nodes from different forks
  # cannot join each other. Override with env: CLUSTEROS_CLUSTER_AUTH_KEY
  auth_key: "GENERATE_AT_BUILD_TIME"
