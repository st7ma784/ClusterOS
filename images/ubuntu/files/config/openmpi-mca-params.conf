# OpenMPI MCA parameter overrides for ClusterOS.
# Installed to /etc/openmpi/openmpi-mca-params.conf.
#
# Forces all MPI TCP traffic to use the Tailscale interface (tailscale0) and
# a fixed user-port range (20000-21000).  This keeps MPI traffic encrypted
# inside the Tailscale overlay and within the egress-filter allowlist, which
# permits all outbound tailscale0 traffic.  Without this, OpenMPI may bind to
# the LAN IP and attempt direct TCP on ephemeral ports, both of which would be
# blocked by the node firewall and/or perimeter firewall.

# Use only TCP BTL (no shared-memory-only paths for inter-node).
btl = tcp,self

# Bind TCP connections to the Tailscale interface only.
btl_tcp_if_include = tailscale0

# Fixed port range for MPI rendezvous.  Must be open in the OUTPUT chain and
# in any intra-cluster perimeter rules (these ports travel inside Tailscale so
# the perimeter firewall never sees them in plaintext).
btl_tcp_port_min_user = 20000
btl_tcp_port_max_user = 21000

# UCX transport: also restrict to Tailscale if UCX is used.
ucx_net_devices = tailscale0
